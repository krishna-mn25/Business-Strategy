  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ap;\n  src: url(\"4a9a24ab-dbb9-4c04-8d02-0675e7705b79\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a645a490-6a9d-44a5-8c58-2bff348a42aa\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4a9a24ab-dbb9-4c04-8d02-0675e7705b79\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n:root{\n  --navy:#05115E;\n  --navy-2:#0D1133;\n  --ink:#0a0e2a;\n  --ink-2:#2b2f55;\n  --muted:#6b7094;\n  --muted-2:#9ea3c2;\n  --line:#e6e8f0;\n  --line-2:#eef0f6;\n  --bg:#f7f8fb;\n  --paper:#ffffff;\n  --violet:#7779F6;\n  --violet-ink:#4659DA;\n  --violet-soft:#eeeefe;\n  --violet-soft-2:#f5f5ff;\n\n  /* candidate categories — semantic */\n  --cat-circle-bg:#f1f1ff;       --cat-circle-bd:#c9caff;   --cat-circle-ink:#3b3ec7;   --cat-circle-active:#4659DA;\n  --cat-fast-bg:#fff4e6;         --cat-fast-bd:#f7c98a;     --cat-fast-ink:#8a4d05;     --cat-fast-active:#7a4205;\n  --cat-found-bg:#e8f6ee;        --cat-found-bd:#7fc998;    --cat-found-ink:#176233;    --cat-found-active:#0d4a25;\n  --cat-grow-bg:#f1ecfa;         --cat-grow-bd:#bda5e7;     --cat-grow-ink:#4a2a86;     --cat-grow-active:#3a1f6e;\n  --cat-impl-bg:#e8f0fa;         --cat-impl-bd:#8db5e0;     --cat-impl-ink:#1f4a82;     --cat-impl-active:#143769;\n  --cat-design-bg:#fbecf2;       --cat-design-bd:#e09bb8;   --cat-design-ink:#7a2a4c;   --cat-design-active:#621b3b;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nhtml{scroll-behavior:smooth}\nbody{\n  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;\n  background:var(--bg);\n  color:var(--ink);\n  font-size:16px;\n  line-height:1.6;\n  font-feature-settings:\"ss01\",\"cv11\";\n  -webkit-font-smoothing:antialiased;\n  -moz-osx-font-smoothing:grayscale;\n}\na{color:inherit}\n.display{font-family:'Sora',sans-serif;letter-spacing:-0.02em}\n\n/* ------- HERO ------- */\n.hero{\n  position:relative;\n  background:radial-gradient(120% 90% at 85% 0%, rgba(119,121,246,.55) 0%, rgba(119,121,246,0) 55%),\n             radial-gradient(80% 70% at 10% 100%, rgba(95,227,240,.20) 0%, rgba(95,227,240,0) 60%),\n             linear-gradient(180deg, #07165f 0%, #05115E 60%, #050d4a 100%);\n  color:#fff;\n  padding:88px clamp(24px,7vw,120px) 72px;\n  overflow:hidden;\n  border-bottom:1px solid #03093d;\n}\n.hero::after{\n  content:\"\";position:absolute;inset:auto 0 0 0;height:1px;\n  background:linear-gradient(90deg, transparent, rgba(119,121,246,.6), transparent);\n}\n.hero-meta{\n  font-family:'Inter';font-size:12px;letter-spacing:.18em;text-transform:uppercase;\n  color:#b4b6ff;margin-bottom:24px;display:flex;align-items:center;gap:14px;\n}\n.hero-meta .dot{width:5px;height:5px;border-radius:50%;background:#7779F6;box-shadow:0 0 14px #7779F6}\n.hero-title{\n  font-family:'Sora';font-weight:600;font-size:clamp(34px,4.4vw,60px);\n  line-height:1.05;letter-spacing:-0.03em;margin-bottom:22px;max-width:880px;\n}\n.hero-title em{font-family:'Newsreader';font-style:italic;font-weight:500;color:#b4b6ff;letter-spacing:-0.01em}\n.hero-sub{\n  font-size:18px;line-height:1.65;color:#cfd2ee;max-width:640px;font-weight:400;\n}\n.hero-foot{\n  margin-top:42px;display:flex;flex-wrap:wrap;gap:10px 24px;align-items:center;\n  font-size:13px;color:#9ea3d8;\n}\n.hero-foot .sep{width:4px;height:4px;border-radius:50%;background:#3a3f7c}\n\n/* ------- LEGEND ------- */\n.legend{\n  background:var(--paper);border-bottom:1px solid var(--line);\n  padding:22px clamp(24px,7vw,120px);\n  display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;\n  position:sticky;top:0;z-index:50;backdrop-filter:saturate(1.2);\n}\n.legend-label{\n  font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;\n  color:var(--muted);margin-right:6px;\n}\n.legend-chip{\n  display:inline-flex;align-items:center;gap:8px;\n  padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:500;\n  border:1px solid;\n}\n.legend-chip .swatch{width:8px;height:8px;border-radius:50%}\n.lc-circle{background:var(--cat-circle-bg);border-color:var(--cat-circle-bd);color:var(--cat-circle-ink)}\n.lc-circle .swatch{background:var(--cat-circle-active)}\n.lc-fast{background:var(--cat-fast-bg);border-color:var(--cat-fast-bd);color:var(--cat-fast-ink)}\n.lc-fast .swatch{background:var(--cat-fast-active)}\n.lc-found{background:var(--cat-found-bg);border-color:var(--cat-found-bd);color:var(--cat-found-ink)}\n.lc-found .swatch{background:var(--cat-found-active)}\n.lc-grow{background:var(--cat-grow-bg);border-color:var(--cat-grow-bd);color:var(--cat-grow-ink)}\n.lc-grow .swatch{background:var(--cat-grow-active)}\n.lc-impl{background:var(--cat-impl-bg);border-color:var(--cat-impl-bd);color:var(--cat-impl-ink)}\n.lc-impl .swatch{background:var(--cat-impl-active)}\n.lc-design{background:var(--cat-design-bg);border-color:var(--cat-design-bd);color:var(--cat-design-ink)}\n.lc-design .swatch{background:var(--cat-design-active)}\n\n/* ------- CONTENT ------- */\n.content{padding:64px clamp(24px,7vw,120px) 96px;max-width:1280px;margin:0 auto}\n\n.sec-label{\n  display:flex;align-items:center;gap:14px;\n  font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;\n  color:var(--muted);margin:56px 0 18px;\n}\n.sec-label:first-child{margin-top:0}\n.sec-label .bar{width:24px;height:1px;background:var(--violet-ink)}\n.sec-label .num{\n  font-family:'Sora';font-size:11px;font-weight:600;color:var(--violet-ink);\n  letter-spacing:.05em;\n}\n\n/* ------- PERSON CARD ------- */\n.pcard{\n  background:var(--paper);\n  border-radius:16px;\n  border:1px solid var(--line);\n  margin-bottom:14px;\n  overflow:hidden;\n  transition:box-shadow .25s, border-color .25s, transform .25s;\n}\n.pcard:hover{box-shadow:0 8px 24px rgba(5,17,94,.06);border-color:#dde0ee}\n.pcard.open{box-shadow:0 12px 40px rgba(5,17,94,.08);border-color:#d6d9eb}\n.pcard-header{\n  display:flex;align-items:flex-start;gap:20px;\n  padding:24px 28px;cursor:pointer;user-select:none;\n}\n.av{\n  width:52px;height:52px;border-radius:14px;\n  display:flex;align-items:center;justify-content:center;\n  font-family:'Sora';font-size:14px;font-weight:600;flex-shrink:0;\n  letter-spacing:.02em;\n}\n.ph-body{flex:1;min-width:0}\n.ph-top{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}\n.ph-name{font-family:'Sora';font-size:21px;font-weight:600;color:var(--ink);letter-spacing:-0.01em}\n.ph-role{\n  font-size:12px;font-weight:500;color:var(--muted);\n  letter-spacing:.08em;text-transform:uppercase;\n  padding:3px 10px;border-radius:999px;background:var(--bg);border:1px solid var(--line);\n}\n.ph-desc{font-size:15.5px;color:var(--ink-2);line-height:1.6;max-width:780px}\n.ph-arrow{\n  font-size:11px;color:var(--muted-2);flex-shrink:0;margin-top:14px;\n  width:32px;height:32px;border-radius:50%;border:1px solid var(--line);\n  display:flex;align-items:center;justify-content:center;\n  transition:transform .3s, background .2s, color .2s;\n}\n.pcard:hover .ph-arrow{background:var(--violet-soft);color:var(--violet-ink);border-color:var(--cat-circle-bd)}\n.pcard.open .ph-arrow{transform:rotate(180deg);background:var(--navy);color:#fff;border-color:var(--navy)}\n\n.pcard-body{max-height:0;overflow:hidden;transition:max-height .5s ease}\n.pcard.open .pcard-body{max-height:5000px}\n.pcard-inner{\n  border-top:1px solid var(--line-2);\n  padding:28px 28px 28px;\n  background:linear-gradient(180deg, #fbfbfd 0%, #fff 60px);\n}\n\n/* ------- GAP BLOCK ------- */\n.gap-block{\n  margin-bottom:28px;padding-bottom:28px;\n  border-bottom:1px dashed var(--line);\n}\n.gap-block:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}\n.gap-name{\n  font-family:'Sora';font-size:13px;font-weight:600;\n  letter-spacing:.04em;color:var(--violet-ink);\n  margin-bottom:8px;display:flex;align-items:center;gap:8px;\n}\n.gap-name::before{\n  content:\"\";width:6px;height:6px;border-radius:50%;\n  background:var(--violet);box-shadow:0 0 0 3px var(--violet-soft);\n}\n.gap-issue{\n  font-size:15px;color:var(--ink-2);margin-bottom:18px;line-height:1.6;\n  font-family:'Newsreader';font-style:italic;font-weight:400;\n  padding-left:14px;border-left:2px solid var(--violet-soft);\n  max-width:760px;\n}\n\n/* ------- CANDIDATE PILLS ------- */\n.cands{display:flex;flex-wrap:wrap;gap:10px}\n.cand-wrap{position:relative}\n.cand-pill{\n  display:inline-flex;align-items:center;gap:10px;\n  padding:10px 16px 10px 14px;\n  border-radius:999px;border:1px solid;\n  cursor:pointer;transition:all .2s;user-select:none;\n  font-size:14.5px;font-weight:500;\n  font-family:'Inter';\n}\n.cand-pill:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(5,17,94,.06)}\n.cand-pill-name{font-weight:600}\n.cand-pill-tag{\n  font-size:11px;font-weight:500;opacity:.8;\n  padding:2px 8px;border-radius:999px;\n  background:rgba(255,255,255,.55);\n  border:1px solid currentColor;\n  border-color:rgba(0,0,0,.08);\n}\n.cand-pill.open .cand-pill-tag{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.25)}\n.cand-pill-arrow{font-size:9px;opacity:.6;transition:transform .25s;margin-left:2px}\n.cand-pill.open .cand-pill-arrow{transform:rotate(180deg);opacity:1}\n\n/* category palettes */\n.cp-circle .cand-pill{background:v n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"legend\">\n  <span class=\"legend-label\">Candidate type<\u002Fspan>\n  <span class=\"legend-chip lc-circle\"><span class=\"swatch\"><\u002Fspan>Your circle · advisors<\u002Fspan>\n  <span class=\"legend-chip lc-fast\"><span class=\"swatch\"><\u002Fspan>Move fast · content + proof<\u002Fspan>\n  <span class=\"legend-chip lc-found\"><span class=\"swatch\"><\u002Fspan>Founding hire · sales + CX<\u002Fspan>\n  <span class=\"legend-chip lc-grow\"><span class=\"swatch\"><\u002Fspan>Account growth + retention<\u002Fspan>\n  <span class=\"legend-chip lc-impl\"><span class=\"swatch\"><\u002Fspan>Implementation · V7 layer<\u002Fspan>\n  <span class=\"legend-chip lc-design\"><span class=\"swatch\"><\u002Fspan>Product design<\u002Fspan>\n<\u002Fdiv>\n\n<main class=\"content\">\n\n<div class=\"sec-label\"><span class=\"num\">01<\u002Fspan><span class=\"bar\"><\u002Fspan><span>Sandeep<\u002Fspan><\u002Fdiv>\n<article class=\"pcard\" id=\"pc-sandeep\">\n  <div class=\"pcard-header\" onclick=\"togP('sandeep')\">\n    <div class=\"av\" style=\"background:#dbeafe;color:#1d4ed8\">SJ<\u002Fdiv>\n    <div class=\"ph-body\">\n      <div class=\"ph-top\"><span class=\"ph-name\">Sandeep Jain<\u002Fspan><span class=\"ph-role\">CEO<\u002Fspan><\u002Fdiv>\n      <div class=\"ph-desc\">Good at product vision. Carrying funding, the investor story, and the strategy alone. Needs people in his circle who've been at this exact stage before.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ph-arrow\">▼<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pcard-body\"><div class=\"pcard-inner\">\n\n    <div class=\"gap-block\">\n      <div class=\"gap-name\">Investor narrative and funding<\u002Fdiv>\n      <div class=\"gap-issue\">Nobody on the team has been through a raise at this scale.<\u002Fdiv>\n      <div class=\"cands\">\n        <div class=\"cand-wrap cp-circle\" id=\"cw-omar\">\n          <div class=\"cand-pill\" onclick=\"togC('omar')\"><span class=\"cand-p t<\u002Fdiv>\n              <div class=\"cand-phrase\">4 consecutive President's Club wins<\u002Fdiv>\n              <div class=\"cand-phrase\">SAP FICO background — speaks the financial language<\u002Fdiv>\n              <div class=\"cand-phrase\">Filters what reaches Spencer — she only sees what is scoped<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv><\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"pcard\" id=\"pc-austin\">\n  <div class=\"pcard-header\" onclick=\"togP('austin')\">\n    <div class=\"av\" style=\"background:#ede9fe;color:#5b21b6\">AT<\u002Fdiv>\n    <div class=\"ph-body\">\n      <div class=\"ph-top\"><span class=\"ph-name\">Austin Turner<\u002Fspan><span class=\"ph-role\">Principal Software Engineer<\u002Fspan><\u002Fdiv>\n      <div class=\"ph-desc\">Good at building the product. Also being asked to turn architecture into stories for customers and the market. Give him someone who thinks like he does to carry that.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ph-arrow\">▼<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pcard-body\"><div class=\"pcard-inner\">\n\n    <div class=\"gap-block\">\n      <div class=\"gap-name\">Product architecture storytelling<\u002Fdiv>\n      <div class=\"gap-issue\">Austin's product vision has no one to translate into customer narratives, case studies, content strategy.<\u002Fdiv>\n      <div class=\"cands\">\n        <div class=\"cand-wrap cp-fast\" id=\"cw-tara\">\n          <div class=\"cand-pill\" onclick=\"togC('tara')\"><span class=\"cand-pill-name\">Tara Rachel Thomas<\u002Fspan><span class=\"cand-pill-tag\">just left Chargebee<\u002Fspan><span class=\"cand-pill-arrow\">▼<\u002Fspan><\u002Fdiv>\n          <div class=\"cand-detail\">\n            <div class=\"cand-detail-head\"><div class=\"cand-detail-name\">Tara Rachel Thomas<\u002Fdiv><a href=\"https://www.linkedin.com/in/tarathomas108/\" target=\"_blank\" class=\"cand-li-link\">LinkedIn ↗<\u002Fa><\u002Fdiv>\n            <div class=\"cand-phrases\">\n              <div class=\"cand-phrase\">6 years at Chargebee, UX Writer to Staff Product Designer<\u002Fdiv>\n              <div class=\"cand-phrase\">Owned Chargebee AI experiences — thinks like Austin<\u002Fdiv>\n              <div class=\"cand-phrase\">Virtual summits, case studies, content for product delivery<\u002Fdiv>\n              <div class=\"cand-phrase\">Referrals, community, and executive content for Perry<\u002Fdiv>\n              <div class=\"cand-phrase\">Just left Chargebee — move fast<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"gap-block\">\n      <div class=\"gap-name\">UX and product design<\u002Fdiv>\n      <div class=\"gap-issue\">As the product surface grows, design sits across engineering without dedicated ownership.<\u002Fdiv>\n      <div class=\"cands\">\n        <div class=\"cand-wrap cp-design\" id=\"cw-mrinalini\">\n          <div class=\"cand-pill\" onclick=\"togC('mrinalini')\"><span class=\"cand-pill-name\">Mrinalini Majumdar<\u002Fspan><span class=\"cand-pill-arrow\">▼<\u002Fspan><\u002Fdiv>\n          <div class=\"cand-detail\">\n            <div class=\"cand-detail-head\"><div class=\"cand-detail-name\">Mrinalini Majumdar<\u002Fdiv><a href=\"https://www.linkedin.com/in/mrinalini-majumdar/\" target=\"_blank\" class=\"cand-li-link\">LinkedIn ↗<\u002Fa><\u002Fdiv>\n            <div class=\"cand-phrases\">\n              <div class=\"cand-phrase\">5 years UX at Optum — data-heavy systems<\u002Fdiv>\n              <div class=\"cand-phrase\">Personal connection, genuinely passionate<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cand-wrap cp-design\" id=\"cw-aditya\">\n          <div class=\"cand-pill\" onclick=\"togC('aditya')\"><span class=\"cand-pill-name\">Aditya Garikapati<\u002Fspan><span class=\"cand-pill-arrow k=\"togC('karthik2')\"><span class=\"cand-pill-name\">Karthik P Bhat<\u002Fspan><span class=\"cand-pill-tag\">founding hire<\u002Fspan><span class=\"cand-pill-arrow\">▼<\u002Fspan><\u002Fdiv>\n          <div class=\"cand-detail\">\n            <div class=\"cand-detail-head\"><div class=\"cand-detail-name\">Karthik P Bhat<\u002Fdiv><a href=\"https://www.linkedin.com/in/karthik-p-bhat-493541133/\" target=\"_blank\" class=\"cand-li-link\">LinkedIn ↗<\u002Fa><\u002Fdiv>\n            <div class=\"cand-phrases\">\n              <div class=\"cand-phrase\">First technical filter on CX prototypes<\u002Fdiv>\n              <div class=\"cand-phrase\">Carries Atreya's initiatives — frees Atreya to be the filter<\u002Fdiv>\n              <div class=\"cand-phrase\">Directs Pylon so customer asks are structured<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cand-wrap cp-found\" id=\"cw-sankari2\">\n          <div class=\"cand-pill\" onclick=\"togC('sankari2')\"><span class=\"cand-pill-name\">Sankari Sivagurunathan<\u002Fspan><span class=\"cand-pill-tag\">founding hire<\u002Fspan><span class=\"cand-pill-arrow\">▼<\u002Fspan><\u002Fdiv>\n          <div class=\"cand-detail\">\n            <div class=\"cand-detail-head\"><div class=\"cand-detail-name\">Sankari Sivagurunathan<\u002Fdiv><a href=\"https://www.linkedin.com/in/sankariss/\" target=\"_blank\" class=\"cand-li-link\">LinkedIn ↗<\u002Fa><\u002Fdiv>\n            <div class=\"cand-phrases\">\n              <div class=\"cand-phrase\">Architecture review above Karthik<\u002Fdiv>\n              <div class=\"cand-phrase\">Catches what neither Atreya nor Karthik would see<\u002Fdiv>\n              <div class=\"cand-phrase\">Can code — her review is substantive not ceremonial<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv><\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"pcard\" id=\"pc-silas\">\n kari<\u002Fspan><span class=\"cand-pill-tag\">architecture check<\u002Fspan><span class=\"cand-pill-arrow\">▼<\u002Fspan><\u002Fdiv>\n          <div class=\"cand-detail\">\n            <div class=\"cand-detail-head\"><div class=\"cand-detail-name\">Sankari Sivagurunathan<\u002Fdiv><a href=\"https://www.linkedin.com/in/sankariss/\" target=\"_blank\" class=\"cand-li-link\">LinkedIn ↗<\u002Fa><\u002Fdiv>\n            <div class=\"cand-phrases\">\n              <div class=\"cand-phrase\">Architecture review before Spencer sees it<\u002Fdiv>\n              <div class=\"cand-phrase\">Catches what would cause rework at Silas's level<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"gap-block\">\n      <div class=\"gap-name\">Implementation and migration<\u002Fdiv>\n      <div class=\"gap-issue\">Implementation work pulls engineering into customer delivery. Silas and Huy shouldn't be in that loop.<\u002Fdiv>\n      <div class=\"cands\">\n        <div class=\"cand-wrap cp-impl\" id=\"cw-andrew\">\n          <div class=\"cand-pill\" onclick=\"togC('andrew')\"><span class=\"cand-pill-name\">Andrew Samuel<\u002Fspan><span class=\"cand-pill-tag\">founding · V7<\u002Fspan><span class=\"cand-pill-arrow\">▼<\u002Fspan><\u002Fdiv>\n          <div class=\"cand-detail\">\n            <div class=\"cand-detail-head\"><div class=\"cand-detail-name\">Andrew Samuel<\u002Fdiv><a href=\"https://www.linkedin.com/in/andrew-samuel-4414a9111/\" target=\"_blank\" class=\"cand-li-link\">LinkedIn ↗<\u002Fa><\u002Fdiv>\n            <div class=\"cand-phrases\">\n              <div class=\"cand-phrase\">Translates MN's exact implementation needs to V7<\u002Fdiv>\n              <div class=\"cand-phrase\">ERP background — Epicor, Dynamics AX, Orion<\u002Fdiv>\n              <div class=\"cand-phrase\">Sets the quality bar for every V7 output<\u002Fdiv>\n              <div class=\"cand-phrase\">Engineering stays on product<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cand-wrap cp-impl\" id=\"cw-pushkaraj\">\n          <div class=\"cand-pill\" onclick=\"togC('pushkaraj')\"><span class=\"cand-pill-name\">Pushkaraj<\u002Fspan><span class=\"cand-pill-tag\">V7 integrations<\u002Fspan><span class=\"cand-pill-arrow\">▼<\u002Fspan><\u002Fdiv>\n          <div class=\"cand-detail\">\n            <div class=\"cand-detail-head\"><div class=\"cand-detail-name\">Pushkaraj Tambat<\u002Fdiv><a href=\"https://www.linkedin.com/in/pushkaraj-tambat-a8612611a/\" target=\"_blank\" class=\"cand-li-link\">LinkedIn ↗<\u002Fa><\u002Fdiv>\n            <div class=\"cand-phrases\">\n              <div class=\"cand-phrase\">Salesforce Q2C and integration architecture<\u002Fdiv>\n              <div class=\"cand-phrase\">9 Salesforce certifications<\u002Fdiv>\n              <div class=\"cand-phrase\">Owns integration-specific V7 items<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cand-wrap cp-impl\" id=\"cw-rumaan\">\n          <div class=\"cand-pill\" onclick=\"togC('rumaan')\"><span class=\"cand-pill-name\">Rumaan<\u002Fspan><span class=\"cand-pill-tag\">V7 migrations<\u002Fspan><span class=\"cand-pill-arrow\">▼<\u002Fspan><\u002Fdiv>\n          <div class=\"cand-detail\">\n            <div class=\"cand-detail-head\"><div class=\"cand-detail-name\">Rumaan Ahmed<\u002Fdiv><a href=\"https://www.linkedin.com/in/rumaan-a-a21ab791/\" target=\"_blank\" class=\"cand-li-link\">LinkedIn ↗<\u002Fa><\u002Fdiv>\n            <div class=\"cand-phrases\">\n              <div class=\"cand-phrase\">Translates migration edge cases to V7<\u002Fdiv>\n              <div class=\"cand-phrase\">GDPR and PCI compliant migration experience<\u002Fdiv>\n              <div class=\"cand-phrase\">7 years at Chargebee across migration and implementation<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cand-wrap cp-impl\" id=\"cw-vijo\">\n          <div class=\"cand-pill\" onclick=\"togC('vijo')\"><span class=\"cand-pill-name\">Vijo<\u002Fspan><span class=\"cand-pill-arrow\">▼<\u002Fspan><\u002Fdiv>\n          <div class=\"cand-detail\">\n            <div class=\"cand-detail-head\"><div class=\"cand-detail-name\">Vijo Varghese<\u002Fdiv><a href=\"https://www.linkedin.com/in/vijovarghesek/\" target=\"_blank\" class=\"cand-li-link\">LinkedIn ↗<\u002Fa><\u002Fdiv>\n            <div class=\"cand-phrases\">\n              <div class=\"cand-phrase\">Implementation support, 15 years overall<\u002Fdiv>\n              <div class=\"cand-phrase\">Has seen every edge case V7 hasn't encountered yet<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv><\u002Fdiv>\n<\u002Farticle>\n\n<!-- ------- PRIORITY ------- -->\n<section class=\"priority\" id=\"priority\">\n  <div class=\"priority-top\">\n    <div class=\"priority-eyebrow\">The decision<\u002Fdiv>\n    <h2 class=\"priority-title\">Where would you start, <em>Sandeep<\u002Fem>?<\u002Fh2>\n    <p class=\"priority-sub\">Pick the tab that matches what is hurting most right now. Each name links to LinkedIn. Budget thinking is included so you can decide what to bring to the team.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"p-tabs\">\n    <div class=\"p-tab active\" onclick=\"showTab('urgent')\"><span class=\"tnum\">01<\u002Fspan>Move fast<\u002Fdiv>\n    <div class=\"p-tab\" onclick=\"showTab('process')\"><span class=\"tnum\">02<\u002Fspan>Fix the process<\u002Fdiv>\n    <div class=\"p-tab\" onclick=\"showTab('circle')\"><span class=\"tnum\">03<\u002Fspan>Your circle<\u002Fdiv>\n    <div class=\"p-tab\" onclick=\"showTab('scale')\"><span class=\"tnum\">04<\u002Fspan>Scale later<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"p-panel active\" id=\"tab-urgent\">\n    <div class=\"p-row\">\n      <div class=\"p-left\">\n        <div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/tarathomas108/\" target=\"_blank\">Tara Rachel Thomas<\u002Fa><\u002Fdiv>\n        <div class=\"p-cnote\">just left Chargebee<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">Austin's product storytelling partner<\u002Fspan><span class=\"ptag\">case studies + referrals for Perry<\u002Fspan><span class=\"ptag\">directs WriteChoice<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\">\n        <div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/swetha-cb/\" target=\"_blank\">Swetha Murali<\u002Fa><\u002Fdiv>\n        <div class=\"p-cnote\">meet first · salary high<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">CFO content + case studies<\u002Fspan><span class=\"ptag\">Brad sells, not writes<\u002Fspan><span class=\"ptag\">community + conferences<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"budget-box\">\n      <div class=\"budget-title\">Budget thinking<\u002Fdiv>\n      <div class=\"budget-body\">Both are based in India. Tara just left Chargebee, so she's taking calls this week — that doesn't last long. Swetha will ask about salary, no way around it. But if she's bought in, equity carries a lot of the weight. I'd rather have that conversation now than spend six months wishing we had her case studies and CFO content.<\u002Fdiv>\n      <div class=\"budget-grid\">\n        <div class=\"bg-box\"><div class=\"bg-label\">Tara specifically<\u002Fdiv><div class=\"bg-text\">She won't be on the market long. Worth a 20-minute call this week, just to see if the chemistry's there. Costs us nothing.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bg-box\"><div class=\"bg-label\">Swetha specifically<\u002Fdiv><div class=\"bg-text\">She'll want to see where this is going before she signs up. If she gets it, she becomes how MN sounds in the market — and you can't really hire that twice.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"p-panel\" id=\"tab-process\">\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/prajit-javery-180470137/\" target=\"_blank\">Prajit Javery<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">Affinity + Jam accounts<\u002Fspan><span class=\"ptag\">CS, retention, growth<\u002Fspan><span class=\"ptag\">highest referrer conviction in the pool<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/sankariss/\" target=\"_blank\">Sankari Sivagurunathan<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">leads CX to engineering chain<\u002Fspan><span class=\"ptag\">solutions architecture<\u002Fspan><span class=\"ptag\">can code, highest technical credibility<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/karthik-p-bhat-493541133/\" target=\"_blank\">Karthik P Bhat<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">TAM anchor, technical accounts<\u002Fspan><span class=\"ptag\">carries Atreya's CX initiatives<\u002Fspan><span class=\"ptag\">professional services anchor<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/praveen-venugopal86/\" target=\"_blank\">Praveen Venugopal<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">enterprise C-suite accounts<\u002Fspan><span class=\"ptag\">nothing slips, no P0 surprises<\u002Fspan><span class=\"ptag\">Xage, Mercell, Teleport<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/andrew-samuel-4414a9111/\" target=\"_blank\">Andrew Samuel<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">V7 implementation owner<\u002Fspan><span class=\"ptag\">engineering stays on product<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"budget-box\">\n      <div class=\"budget-title\">Budget thinking<\u002Fdiv>\n      <div class=\"budget-body\">All five are in India, so the combined cost is fine. Prajit moves the needle fastest — Affinity and Jam need someone on them yesterday. Sankari and Karthik come as a pair; hiring one without the other doesn't really work. Praveen and Andrew can wait a quarter, once the CS layer is up.<\u002Fdiv>\n      <div class=\"budget-grid\">\n        <div class=\"bg-box\"><div class=\"bg-label\">Why this group first<\u002Fdiv><div class=\"bg-text\">Between them, these five cover every gap that's costing us accounts right now. No overlap.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bg-box\"><div class=\"bg-label\">Honest sequencing<\u002Fdiv><div class=\"bg-text\">Start with Prajit. Then Sankari and Karthik together. Praveen and Andrew next quarter, when the implementation load makes the case for itself.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"p-panel\" id=\"tab-circle\">\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/omarnawaz/\" target=\"_blank\">Omar Nawaz<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">CPO at Chargebee $8M to $80M ARR<\u002Fspan><span class=\"ptag\">investor narrative + product vision<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/germainbrion/\" target=\"_blank\">Germain Brion<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">revenue 100x at Chargebee<\u002Fspan><span class=\"ptag\">$250M Series H<\u002Fspan><span class=\"ptag\">revenue strategy + GTM<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/andydwang/\" target=\"_blank\">Andy Wang<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">GM ByteDance North America<\u002Fspan><span class=\"ptag\">enterprise AI GTM<\u002Fspan><span class=\"ptag\">Spencer's future AI partner<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"budget-box\">\n      <div class=\"budget-title\">Budget thinking<\u002Fdiv>\n      <div class=\"budget-body\">Omar and Germain are fractional — so this is a retainer, not a hire. They already work together at ilimcraft, so approach them as a pair. Honestly: two people who were in the room when Chargebee went from nothing to $3.5B telling investors they're backing MN — that changes how those calls go.<\u002Fdiv>\n      <div class=\"budget-grid\">\n        <div class=\"bg-box\"><div class=\"bg-label\">What you're actually buying<\u002Fdiv><div class=\"bg-text\">A few hours a week, plus their names on our side of the table. Cheap for what it unlocks.<\u002Fdiv><\u002Fdiv>\n        <div class=\"bg-box\"><div class=\"bg-label\">Why Omar and Germain specifically<\u002Fdiv><div class=\"bg-text\">They were at Chargebee from the early days through the big rounds. They've stood exactly where you're standing now.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"p-panel\" id=\"tab-scale\">\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/aqil-bary-92692218b/\" target=\"_blank\">Aqil Bary<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">technical post-sales<\u002Fspan><span class=\"ptag\">deep Chargebee product knowledge<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/sanjana-balakrishnan-customer-success/\" target=\"_blank\">Sanjana Balakrishnan<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">CS across SMB to enterprise<\u002Fspan><span class=\"ptag\">retention, strategic accounts<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/pushkaraj-tambat-a8612611a/\" target=\"_blank\">Pushkaraj Tambat<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">Salesforce Q2C, 9 certifications<\u002Fspan><span class=\"ptag\">V7 integrations layer<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/rumaan-a-a21ab791/\" target=\"_blank\">Rumaan Ahmed<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">V7 migration translation<\u002Fspan><span class=\"ptag\">GDPR/PCI migration experience<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/nivedha-venkatesh/\" target=\"_blank\">Nivedha Venkatesh<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">pre-sales volume, mid-market<\u002Fspan><span class=\"ptag\">entire career at Chargebee<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"p-row\">\n      <div class=\"p-left\"><div class=\"p-cname\"><a href=\"https://www.linkedin.com/in/vijovarghesek/\" target=\"_blank\">Vijo Varghese<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"p-tags\"><span class=\"ptag\">implementation support<\u002Fspan><span class=\"ptag\">15 years across platforms<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"budget-box\">\n      <div class=\"budget-title\">Budget thinking<\u002Fdiv>\n      <div class=\"budget-body\">All in India. None of these are urgent — and that's the point. Bring them in once the founding layer is running and the account volume actually needs more hands. Hire too early and you've just added coordination overhead before the process even works.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"p-closing\"><strong>80% of this list is in India.<\u002Fstrong> Total cost is fine. Start where it's bleeding. Build from there.<\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"signoff\">\n  <div>\n    <div class=\"sig\">Happy to walk through any of this whenever. Let me know.<\u002Fdiv>\n    <div style=\"margin-top:6px\">May 2026 · For Sandeep's eyes<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"text-align:right\">\n    <div style=\"font-family:'Sora';font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--violet-ink)\">Confidential<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fmain>\n\n<script>\nfunction togP(id){\n  const c=document.getElementById('pc-'+id);\n  if(c)c.classList.toggle('open');\n}\nfunction togC(id){\n  const w=document.getElementById('cw-'+id);\n  if(!w)return;\n  const o=w.classList.contains('open');\n  w.classList.toggle('open',!o);\n  const p=w.querySelector('.cand-pill');\n  if(p)p.classList.toggle('open',!o);\n}\nfunction showTab(id){\n  const ids=['urgent','process','circle','scale'];\n  document.querySelectorAll('.p-tab').forEach((t,i)=>t.classList.toggle('active',ids[i]===id));\n  document.querySelectorAll('.p-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+id));\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
